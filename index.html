function resizeCanvas() {
  const w = window.innerWidth, h = window.innerHeight;
  const ratio = CANVAS_W / CANVAS_H;
  gameH = w / h > ratio ? w / ratio : h;
  gameW = gameH * ratio;
  scale = gameW / CANVAS_W;
  canvas.style.width = gameW + 'px';
  canvas.style.height = gameH + 'px';
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function rectOverlap(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }
function rand(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function toRad(d) { return d * Math.PI / 180; }

class InputHandler {
  constructor() {
    this.dirQueue = new Array(60).fill(0); this.dirIndex = 0; this.currentDir = 0;
    this.joystickActive = false;
    this.joystickBase = { x:0, y:0 };
    this.joystickCurrent = { x:0, y:0 };
    this.joystickDrag = { dx:0, dy:0, dist:0, angle:0 };
    this._lastDragDy = 0;
    this.rapidFlick = false;
    this.flickStartTime = 0; this.flickStartY = 0; this.flickSpeed = 0;
    this.lp = false; this.lpJust = false;
    this.hp = false; this.hpHold = false; this.hpHoldStart = 0; this.hpJust = false;
    this.sp = false; this.spDir = -1; this.spStart = { x:0, y:0 }; this.spJust = false;
    this.block = false; this.blockTimer = 0;
    this.buffer = [];
    this.joystickId = null;
    this.buttonId_lp = null; this.buttonId_hp = null; this.buttonId_sp = null;
    this.keys = {};
    this._setupTouch(); this._setupKeyboard();
  }

  _setupTouch() {
    canvas.addEventListener('touchstart', e => this._onTouchStart(e), { passive:false });
    canvas.addEventListener('touchmove', e => this._onTouchMove(e), { passive:false });
    canvas.addEventListener('touchend', e => this._onTouchEnd(e), { passive:false });
    canvas.addEventListener('touchcancel', e => this._onTouchEnd(e), { passive:false });
  }

  _setupKeyboard() {
    window.addEventListener('keydown', e => {
      this.keys[e.key] = true;
      if (e.key === 'ArrowLeft' || e.key === 'a') this.currentDir = 5;
      if (e.key === 'ArrowRight' || e.key === 'd') this.currentDir = 1;
      if (e.key === 'ArrowUp' || e.key === 'w') this.currentDir = 3;
      if (e.key === 'ArrowDown' || e.key === 's') this.currentDir = 7;
      if (e.key === 'j') { this.lp = true; this.lpJust = true; }
      if (e.key === 'k') { this.hp = true; this.hpHold = true; this.hpHoldStart = performance.now(); this.hpJust = true; }
      if (e.key === 'u') { this.sp = true; this.spJust = true; this.spDir = this.currentDir || 1; }
      if (e.key === 'i') { this.block = true; this.blockTimer = 180; }
      if (e.key === 'o') { this.rapidFlick = true; }
    });
    window.addEventListener('keyup', e => {
      this.keys[e.key] = false;
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ArrowRight' || e.key === 'd' ||
          e.key === 'ArrowUp' || e.key === 'w' || e.key === 'ArrowDown' || e.key === 's') {
        if (!this.keys['ArrowLeft'] && !this.keys['a'] && !this.keys['ArrowRight'] && !this.keys['d'] &&
            !this.keys['ArrowUp'] && !this.keys['w'] && !this.keys['ArrowDown'] && !this.keys['s']) this.currentDir = 0;
      }
      if (e.key === 'j') this.lp = false;
      if (e.key === 'k') { this.hp = false; this.hpHold = false; }
      if (e.key === 'u') this.sp = false;
      if (e.key === 'i') this.block = false;
      if (e.key === 'o') this.rapidFlick = false;
    });
  }

  _toGameCoords(t) { const rect = canvas.getBoundingClientRect(); return { x:(t.clientX-rect.left)/scale, y:(t.clientY-rect.top)/scale }; }
  _getDir8(dx, dy) {
    if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return 0;
    const a = ((Math.atan2(-dy, dx) * 180 / Math.PI) + 360) % 360;
    if (a >= 337.5 || a < 22.5) return 1;
    if (a < 67.5) return 2;
    if (a < 112.5) return 3;
    if (a < 157.5) return 4;
    if (a < 202.5) return 5;
    if (a < 247.5) return 6;
    if (a < 292.5) return 7;
    return 8;
  }

  _onTouchStart(e) {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const p = this._toGameCoords(t);
      if (p.x < CANVAS_W / 2 && p.y > CANVAS_H * 0.35) {
        this.joystickActive = true;
        this.joystickBase = { x:p.x, y:p.y };
        this.joystickCurrent = { x:p.x, y:p.y };
        this.flickStartTime = performance.now(); this.flickStartY = p.y;
        this.joystickId = t.identifier;
      }
      if (p.x > CANVAS_W / 2 && p.y > CANVAS_H * 0.35) {
        if (p.y < CANVAS_H * 0.55) { this.lp = true; this.lpJust = true; this.buttonId_lp = t.identifier; }
        else if (p.y < CANVAS_H * 0.75) { this.hp = true; this.hpHold = true; this.hpHoldStart = performance.now(); this.hpJust = true; this.buttonId_hp = t.identifier; }
        else { this.sp = true; this.spStart = { x:p.x, y:p.y }; this.spDir = -1; this.spJust = true; this.buttonId_sp = t.identifier; }
      }
    }
  }

  _onTouchMove(e) {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const p = this._toGameCoords(t);
      if (t.identifier === this.joystickId) {
        this.joystickCurrent = { x:p.x, y:p.y };
        const dx = p.x - this.joystickBase.x, dy = p.y - this.joystickBase.y;
        const d = Math.hypot(dx, dy);
        this.joystickDrag = { dx, dy, dist:d, angle:Math.atan2(-dy, dx) };
        this._lastDragDy = dy;
        this.flickSpeed = d / Math.max(1, (performance.now() - this.flickStartTime) / 1000);
        this.currentDir = this._getDir8(dx, dy);
        if (dy > 25 && d > 25 && performance.now() - this.flickStartTime < 50) this.rapidFlick = true;
        if (Math.abs(dx) > 25 && this.flickSpeed > 200) this.rapidFlick = true;
      }
      if (t.identifier === this.buttonId_sp && this.sp) {
        const sdx = p.x - this.spStart.x, sdy = p.y - this.spStart.y;
        if (Math.hypot(sdx, sdy) > 20) this.spDir = this._getDir8(sdx, sdy);
      }
    }
  }

  _onTouchEnd(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === this.joystickId) {
        const elapsed = performance.now() - this.flickStartTime;
        if (this._lastDragDy > 25 && elapsed < 50) { this.block = true; this.blockTimer = 180; }
        this.joystickActive = false;
        this.joystickCurrent = { ...this.joystickBase };
        this.joystickDrag = { dx:0, dy:0, dist:0, angle:0 };
        this._lastDragDy = 0; this.currentDir = 0; this.joystickId = null; this.rapidFlick = false;
      }
      if (t.identifier === this.buttonId_lp) { this.lp = false; this.buttonId_lp = null; }
      if (t.identifier === this.buttonId_hp) { this.hp = false; this.hpHold = false; this.buttonId_hp = null; }
      if (t.identifier === this.buttonId_sp) { this.sp = false; this.buttonId_sp = null; }
    }
  }

  update() {
    this.dirQueue[this.dirIndex] = this.currentDir; this.dirIndex = (this.dirIndex + 1) % 60;
    if (this.lpJust) this.buffer.push({ t:'lp', frame:0 });
    if (this.hpJust) this.buffer.push({ t:'hp', frame:0 });
    if (this.spJust && this.spDir > 0) this.buffer.push({ t:'sp', dir:this.spDir, frame:0 });
    for (let i = this.buffer.length - 1; i >= 0; i--) { this.buffer[i].frame++; if (this.buffer[i].frame > INPUT_BUFFER) this.buffer.splice(i, 1); }
    if (this.block && this.blockTimer > 0) { this.blockTimer--; if (this.blockTimer <= 0) this.block = false; }
  }
  endFrame() { this.lpJust = false; this.hpJust = false; this.spJust = false; }

  drawJoystick(ctx) {
    const bx = 140, by = CANVAS_H - 140;
    ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(bx, by, 70, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.04)'; ctx.fill();
    const cx = this.joystickActive ? clamp(this.joystickCurrent.x, bx - 70, bx + 70) : bx;
    const cy = this.joystickActive ? clamp(this.joystickCurrent.y, by - 70, by + 70) : by;
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.arc(cx, cy, 30, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx, cy, 30, 0, Math.PI * 2); ctx.stroke();
  }

  drawButtons(ctx) {
    const cx = CANVAS_W - 140;
    const buttons = [
      { y:CANVAS_H * 0.42, label:'轻拳', active:this.lp, color:'rgba(255,150,150,0.45)', activeColor:'#ff9999' },
      { y:CANVAS_H * 0.62, label:'重拳', active:this.hp, color:'rgba(255,100,100,0.45)', activeColor:'#ff6666' },
      { y:CANVAS_H * 0.82, label:'必杀', active:this.sp, color:'rgba(255,170,0,0.45)', activeColor:'#ffaa00' }
    ];
    buttons.forEach(b => {
      ctx.fillStyle = b.active ? b.activeColor : b.color;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(cx - 40, b.y, 80, 80, 40); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(b.label, cx, b.y + 48);
    });
  }
}
const input = new InputHandler();

class Particle {
  constructor(x, y, vx, vy, life, color, size) { this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life; this.color=color; this.size=size||4; }
  update() { this.x += this.vx; this.y += this.vy; this.vy += 0.12; this.life--; this.vx *= 0.98; }
  alive() { return this.life > 0; }

class Fighter {
  constructor(charId, x, facingRight, isPlayer1) {
    const data = CHARACTERS[charId];
    this.charId = charId; this.charData = data;
    this.x = x; this.y = GROUND_Y;
    this.vx = 0; this.vy = 0;
    this.facingRight = facingRight; this.isPlayer1 = isPlayer1;
    this.width = 55; this.height = 110;
    this.hp = MAX_HP; this.maxHp = MAX_HP;
    this.walkSpeed = data.walkSpeed; this.jumpVelocity = data.jumpVelocity; this.gravity = data.gravity;
    this.state = 'IDLE'; this.grounded = true;
    this.attackData = null; this.attackPhase = ''; this.attackPhaseTimer = 0; this.attackHit = false; this.canAct = true;
    this.hitStunTimer = 0; this.knockbackVx = 0; this.blocking = false;
    this.dashFrames = 0; this.invincibleFrames = 0;
    this.electricParalyze = 0; this.freezeTimer = 0; this.fireDOT = 0; this.fireDOTTimer = 0;
    this.animState = 'idle'; this.animFrameIdx = 0; this.animTick = 0; this.flashTimer = 0;
    this.totalAttacks = 0; this.specialUsed = 0; this.jumpAttacks = 0; this.blocks = 0; this.dashes = 0;
    this.hitsLanded = 0; this.hitsTaken = 0; this.combosStarted = 0;
  }

  getHitbox() { return { x:this.x - this.width/2, y:this.y - this.height, w:this.width, h:this.height }; }
  getAttackbox() {
    if (!this.attackData || this.attackPhase !== 'active') return null;
    const range = this.attackData.range, d = this.facingRight ? 1 : -1;
    return { x:this.x + (d > 0 ? this.width/2 : -this.width/2 - range), y:this.y - this.height * 0.65, w:range, h:this.height * 0.45 };
  }

  canActNow() { return this.canAct && this.state !== 'HIT' && this.state !== 'BLOCK' && this.dashFrames <= 0 && this.freezeTimer <= 0; }

  startAttack(type, dir) {
    if (!this.canActNow()) return;
    let atk = null;
    if (type === 'lp') atk = this.charData.attacks.lp;
    else if (type === 'hp') atk = this.charData.attacks.hp;
    else if (type === 'sp') {
      const key = DIR_KEYS[dir || 1];
      atk = this.charData.attacks['sp_' + key];
      if (!atk) return;
      this.specialUsed++;
    }
    if (!atk) return;
    this.attackData = atk; this.attackPhase = 'startup'; this.attackPhaseTimer = atk.startup; this.attackHit = false;
    this.state = 'ATTACK'; this.canAct = false; this.totalAttacks++;
    this.animState = type === 'sp' ? 'special' : (type === 'hp' ? 'hp' : 'lp');
    this.animFrameIdx = 0; this.animTick = 0;
  }

  updateAttack() {
    if (!this.attackData) return;
    this.attackPhaseTimer--;
    if (this.attackPhaseTimer <= 0) {
      if (this.attackPhase === 'startup') { this.attackPhase = 'active'; this.attackPhaseTimer = this.attackData.active; }
      else if (this.attackPhase === 'active') { this.attackPhase = 'recovery'; this.attackPhaseTimer = this.attackData.recovery; }
      else { this.attackData = null; this.attackPhase = ''; this.state = 'IDLE'; this.canAct = true; this.animState = 'idle'; }
    }
  }

  applyHit(attackData, attacker) {
    if (this.invincibleFrames > 0) return;
    if (this.blocking || this.state === 'BLOCK') {
      this.hitStunTimer = attackData.bStun; this.knockbackVx = (attacker.facingRight ? 1 : -1) * attackData.kb * 0.3;
      this.state = 'BLOCK'; this.animState = 'block';
      particles.spawn(this.x, this.y - 50, 4, '#ffffff', 1.5, 3);
      return;
    }
    if (this.state === 'HIT') return;
    const dmg = attackData.dmg;
    this.hp -= dmg; this.hitsTaken++; attacker.hitsLanded++;
    this.hitStunTimer = attackData.hStun; this.knockbackVx = (attacker.facingRight ? 1 : -1) * attackData.kb * 0.5;
    this.vy = -4; this.state = 'HIT'; this.canAct = false;
    this.attackData = null; this.attackPhase = ''; this.animState = 'hit'; this.grounded = false; this.flashTimer = 4;
    if (attackData.elec) this.electricParalyze = 15;
    if (attackData.freeze) this.freezeTimer = 35;
    if (attackData.fire) { this.fireDOT = dmg * 0.15; this.fireDOTTimer = 60; }
    comboCount++;
    if (comboCount > maxCombo) { maxCombo = comboCount; if (maxCombo > saveData.playerStats.highestCombo) saveData.playerStats.highestCombo = maxCombo; }
    hitSparkTimer = 8; screenShake = 5;
    particles.spawn(this.x, this.y - 50, 10, '#ffff00', 5, 4);
    particles.spawn(this.x, this.y - 50, 5, attacker.charData.accent, 3, 3);
  }

  update() {
    if (this.flashTimer > 0) this.flashTimer--;
    if (this.invincibleFrames > 0) this.invincibleFrames--;
    if (this.dashFrames > 0) this.dashFrames--;
    if (this.electricParalyze > 0) this.electricParalyze--;
    if (this.freezeTimer > 0) this.freezeTimer--;
    if (this.fireDOTTimer > 0) { this.fireDOTTimer--; if (this.fireDOTTimer % 30 === 0) this.hp -= this.fireDOT; }

    this.updateAttack();

    if (this.state === 'HIT') {
      this.hitStunTimer--; this.x += this.knockbackVx; this.knockbackVx *= 0.85;
      if (this.grounded) this.knockbackVx *= 0.8;
      if (this.hitStunTimer <= 0) { this.state = 'IDLE'; this.canAct = true; this.animState = 'idle'; comboCount = 0; }
    }
    if (this.state === 'BLOCK') {
      this.hitStunTimer--; this.x += this.knockbackVx; this.knockbackVx *= 0.85;
      if (this.hitStunTimer <= 0) { this.state = 'IDLE'; this.canAct = true; this.blocking = false; this.animState = 'idle'; }
    }

    if (!this.grounded) { this.vy += this.gravity; this.y += this.vy; if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; this.grounded = true; if (this.state === 'HIT') { this.state = 'IDLE'; this.canAct = true; this.animState = 'idle'; comboCount = 0; } } }
    this.x = clamp(this.x, LEFT_BOUND, RIGHT_BOUND);

    this.animTick++;
    const animSpeeds = { idle:8, walk:4, jump:8, lp:3, hp:3, special:3, hit:4, block:8 };
    const speed = animSpeeds[this.animState] || 8;
    if (this.animTick >= speed) { this.animTick = 0; this.animFrameIdx++; }
  }

  extractBehaviorVector() {
    const total = Math.max(1, this.totalAttacks);
    return [
      clamp(this.totalAttacks / 120, 0.1, 1),
      clamp(this.combosStarted / Math.max(1, this.totalAttacks), 0.1, 1),
      clamp(this.dashes / 120, 0.05, 1),
      clamp(this.blocks / 120, 0.05, 1),
      clamp(this.jumpAttacks / Math.max(1, this.totalAttacks), 0.05, 1),
      clamp(this.specialUsed / Math.max(1, this.totalAttacks), 0.05, 1)
    ];
  }
}

function drawFighter(ctx, f) {
  ctx.save();
  if (f.invincibleFrames > 0 && f.invincibleFrames % 4 < 2) ctx.globalAlpha = 0.4;
  if (f.freezeTimer > 0) ctx.globalAlpha = 0.6;
  if (f.flashTimer > 0 && f.flashTimer % 2 === 0) ctx.globalAlpha = 0.4;

  // 阴影
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(f.x, GROUND_Y - 3, 28, 8, 0, 0, Math.PI * 2); ctx.fill();

  // 绘制各角色
  switch (f.charData.style) {
    case 'ninja': drawShadowBlade(ctx, f); break;
    case 'warrior': drawThunder(ctx, f); break;
    case 'golem': drawBoulder(ctx, f); break;
    case 'monk': drawFlameDancer(ctx, f); break;
    case 'mage': drawFrostWhisper(ctx, f); break;
    default: drawShadowBlade(ctx, f);
  }

  // 防御护盾
  if (f.blocking || f.state === 'BLOCK') {
    ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(f.x, f.y - 65, 45, -Math.PI * 0.7, Math.PI * 0.7); ctx.stroke();
    ctx.fillStyle = 'rgba(68,136,255,0.15)'; ctx.fill();
  }

  // 麻痹特效
  if (f.electricParalyze > 0) {
    ctx.strokeStyle = '#ffff00'; ctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath(); ctx.moveTo(f.x - 25 + rand(0,50), f.y - 110 + rand(0,90)); ctx.lineTo(f.x - 25 + rand(0,50), f.y - 110 + rand(0,90)); ctx.stroke();
    }
  }

  // 火焰DOT
  if (f.fireDOTTimer > 0) {
    ctx.fillStyle = '#ff4400'; ctx.globalAlpha = (ctx.globalAlpha || 1) * 0.5;
    ctx.beginPath(); ctx.arc(f.x + rand(-10,10), f.y - 50 + rand(-20,10), rand(5,12), 0, Math.PI * 2); ctx.fill();
  }

  ctx.restore();
}

// ============================================================
// AI 控制器
// ============================================================
class AIController {
  constructor(difficulty, behaviorVector) {
    this.difficulty = difficulty;
    this.bv = behaviorVector || [0.5, 0.3, 0.2, 0.3, 0.2, 0.3];
    this.decisionTimer = 0;
    this.reactionDelay = difficulty === 'easy' ? 15 : (difficulty === 'normal' ? 8 : 3);
    this.strategy = 'neutral'; this.stuckTimer = 0; this.lastX = 0;
  }
  update(self, opponent) {
    this.decisionTimer++; if (this.decisionTimer < this.reactionDelay) return null;
    this.decisionTimer = 0;
    if (Math.abs(self.x - this.lastX) < 0.5) this.stuckTimer++; else this.stuckTimer = 0;
    this.lastX = self.x;

    const dist = Math.abs(self.x - opponent.x);
    const hpR = self.hp / self.maxHp, oppHpR = opponent.hp / opponent.maxHp;
    const bv = this.bv;

    if (hpR > 0.7 && oppHpR < 0.3) this.strategy = 'aggressive';
    else if (hpR < 0.3) this.strategy = 'defensive';
    else this.strategy = 'neutral';

    const action = {};
    const idealDist = this.strategy === 'aggressive' ? 55 : (this.strategy === 'defensive' ? 130 : 80);
    if (this.stuckTimer > 30) { action.move = Math.random() > 0.5 ? 1 : -1; this.stuckTimer = 0; }
    else if (dist > idealDist + 25) action.move = self.x < opponent.x ? 1 : -1;
    else if (dist < idealDist - 15) action.move = self.x < opponent.x ? -1 : 1;

    const roll = Math.random();
    if (this.strategy === 'aggressive') { if (roll < bv[0] * 0.8 && dist < 100) { if (roll < 0.2 && bv[5] > 0.3) action.attack = 'sp'; else if (roll < 0.5) action.attack = 'hp'; else action.attack = 'lp'; } }
    else if (this.strategy === 'neutral') { if (roll < bv[0] * 0.5 && dist < 90) { if (roll < 0.12 && bv[5] > 0.3) action.attack = 'sp'; else if (roll < 0.35) action.attack = 'hp'; else action.attack = 'lp'; } }
    else { if (roll < bv[0] * 0.25 && dist < 80) action.attack = 'lp'; }

    if (opponent.attackData && opponent.attackPhase === 'active') { if (Math.random() < bv[3] * (this.strategy === 'defensive' ? 1.5 : 1)) { action.block = true; action.attack = null; } }
    if (Math.random() < bv[2] * 0.08) { action.dash = true; action.attack = null; }
    if (self.grounded && Math.random() < bv[4] * 0.06 && dist < 100) { action.jump = true; if (!action.attack) action.attack = Math.random() < 0.5 ? 'hp' : 'lp'; }
    if (action.attack === 'sp') action.spDir = randInt(1, 8);
    return action;
  }
}

const STATE = { MENU:0, CHAR_SELECT:1, FIGHTING:2, TRAINING:3, SHADOW_DOJO:4, AUTO_BATTLE:5 };
let gameState = STATE.MENU;
let stateSubState = null, stateTimer = 0;
let menuSelection = 0;
const MENU_ITEMS = ['征战之路 PVE', '双人对战', '训练模式', '影武道场', '离线斗技场'];
let charSelectP1 = 0, charSelectP2 = 0;
let unlockedCharIds = [];
let fightMode = 'pve';
let roundNumber = 0, p1Wins = 0, p2Wins = 0;
let roundTimer = 0, comboCount = 0, maxCombo = 0;
let hitSparkTimer = 0, screenShake = 0;
let roundMessages = [], notificationText = '', notificationTimer = 0;
let unlockMsg = '', unlockMsgTimer = 0;
let p1 = null, p2 = null, ai = null;
let autoBattleSel1 = 0, autoBattleSel2 = 1;
let autoBattleAI1 = null, autoBattleAI2 = null;

function initFight(mode) {
  fightMode = mode; roundNumber = 0; p1Wins = 0; p2Wins = 0;
  unlockedCharIds = saveData.unlockedCharacters.filter(c => CHARACTERS[c]);
  if (unlockedCharIds.length === 0) unlockedCharIds = ['shadow_blade'];

  if (mode === 'pve') {
    const p1Char = unlockedCharIds[charSelectP1] || 'shadow_blade';
    const aiChars = unlockedCharIds.filter(c => c !== p1Char);
    const p2Char = aiChars.length > 0 ? aiChars[randInt(0, aiChars.length - 1)] : 'shadow_blade';
    p1 = new Fighter(p1Char, 300, true, true);
    p2 = new Fighter(p2Char, 980, false, false);
    ai = new AIController('normal');
    if (!saveData.playerStats.charUsage) saveData.playerStats.charUsage = {};
    if (!saveData.playerStats.charUsage[p1Char]) saveData.playerStats.charUsage[p1Char] = { matches:0, wins:0 };
    saveData.playerStats.charUsage[p1Char].matches++;
  } else if (mode === 'pvp') {
    p1 = new Fighter(unlockedCharIds[charSelectP1] || 'shadow_blade', 300, true, true);
    p2 = new Fighter(unlockedCharIds[charSelectP2] || 'shadow_blade', 980, false, false);
    ai = null;
  } else if (mode === 'training') {
    p1 = new Fighter(unlockedCharIds[charSelectP1] || 'shadow_blade', 300, true, true);
    p2 = new Fighter('shadow_blade', 980, false, false); p2.hp = 99999;
    ai = null;
  } else if (mode === 'auto') {
    if (saveData.shadowAIs.length < 2) return;
    const ai1 = saveData.shadowAIs[autoBattleSel1], ai2 = saveData.shadowAIs[autoBattleSel2];
    if (!ai1 || !ai2) return;
    p1 = new Fighter(ai1.characterId, 300, true, true);
    p2 = new Fighter(ai2.characterId, 980, false, false);
    autoBattleAI1 = new AIController('hard', ai1.behaviorVector);
    autoBattleAI2 = new AIController('hard', ai2.behaviorVector);
    ai = null;
  }

  roundTimer = ROUND_DURATION; comboCount = 0; maxCombo = 0;
  gameState = mode === 'training' ? STATE.TRAINING : STATE.FIGHTING;
  stateSubState = 'ROUND_INTRO'; stateTimer = 90; roundMessages = [];
}

function startRound() {
  if (p1) { p1.x = 300; p1.y = GROUND_Y; p1.hp = MAX_HP; p1.vx = 0; p1.vy = 0; p1.state = 'IDLE'; p1.canAct = true; p1.attackData = null; p1.animState = 'idle'; p1.blocking = false; }
  if (p2) { p2.x = 980; p2.y = GROUND_Y; p2.hp = fightMode === 'training' ? 99999 : MAX_HP; p2.vx = 0; p2.vy = 0; p2.state = 'IDLE'; p2.canAct = true; p2.attackData = null; p2.animState = 'idle'; p2.blocking = false; }
  roundTimer = ROUND_DURATION; comboCount = 0; stateSubState = 'FIGHT';
}

function handlePlayerInput(fighter, isP1) {
  if (!fighter || !fighter.canActNow()) return;
  const dir = input.currentDir;
  if (dir === 1 || dir === 2 || dir === 8) { fighter.x += fighter.walkSpeed; fighter.facingRight = true; if (fighter.grounded) fighter.animState = 'walk'; }
  else if (dir === 4 || dir === 5 || dir === 6) { fighter.x -= fighter.walkSpeed; fighter.facingRight = false; if (fighter.grounded) fighter.animState = 'walk'; }
  else if (fighter.grounded) fighter.animState = 'idle';

  if (dir === 3 && fighter.grounded) { fighter.vy = fighter.jumpVelocity; fighter.grounded = false; fighter.animState = 'jump'; fighter.jumpAttacks++; }

  if (input.block && fighter.grounded) { fighter.blocking = true; fighter.blocks++; return; }
  fighter.blocking = false;

  if (input.rapidFlick && fighter.grounded) { fighter.dashFrames = 5; fighter.invincibleFrames = 5; fighter.dashes++; particles.spawn(fighter.x, fighter.y - 55, 12, fighter.charData.accent, 2.5, 3); input.rapidFlick = false; return; }

  if (input.lpJust) fighter.startAttack('lp');
  else if (input.hpJust) fighter.startAttack('hp');
  else if (input.spJust && input.spDir > 0) fighter.startAttack('sp', input.spDir);
}

function handleAIInput(fighter, opponent, aiCtrl) {
  if (!fighter || !fighter.canActNow()) return;
  const action = aiCtrl.update(fighter, opponent); if (!action) return;
  if (action.move === 1) { fighter.x += fighter.walkSpeed; fighter.facingRight = true; fighter.animState = 'walk'; }
  else if (action.move === -1) { fighter.x -= fighter.walkSpeed; fighter.facingRight = false; fighter.animState = 'walk'; }
  if (action.jump && fighter.grounded) { fighter.vy = fighter.jumpVelocity; fighter.grounded = false; fighter.animState = 'jump'; }
  if (action.block) { fighter.blocking = true; return; }
  fighter.blocking = false;
  if (action.dash && fighter.grounded) { fighter.dashFrames = 5; fighter.invincibleFrames = 5; return; }
  if (action.attack === 'lp') fighter.startAttack('lp');
  else if (action.attack === 'hp') fighter.startAttack('hp');
  else if (action.attack === 'sp') fighter.startAttack('sp', action.spDir || 1);
}

function checkCollisions() {
  if (!p1 || !p2) return;
  const a1 = p1.getAttackbox(); if (a1) { const h2 = p2.getHitbox(); if (rectOverlap(a1, h2) && !p1.attackHit) { p1.attackHit = true; p2.applyHit(p1.attackData, p1); } }
  const a2 = p2.getAttackbox(); if (a2) { const h1 = p1.getHitbox(); if (rectOverlap(a2, h1) && !p2.attackHit) { p2.attackHit = true; p1.applyHit(p2.attackData, p2); } }
}

function checkRoundEnd() {
  if (stateSubState !== 'FIGHT') return;
  let winner = null;
  if (p1.hp <= 0) winner = 'p2';
  else if (p2.hp <= 0) winner = 'p1';
  else if (roundTimer <= 0) winner = p1.hp > p2.hp ? 'p1' : (p2.hp > p1.hp ? 'p2' : 'draw');

  if (winner) {
    stateSubState = 'ROUND_END'; stateTimer = 60;
    if (winner === 'p1') p1Wins++; else if (winner === 'p2') p2Wins++;
    roundMessages.push(winner === 'p1' ? 'P1 获胜!' : (winner === 'p2' ? 'P2 获胜!' : '平局!'));

    if (fightMode === 'pve') {
      if (winner === 'p1') {
        saveData.playerStats.wins++; saveData.gold += 100;
        if (saveData.playerStats.charUsage && p1) { const cu = saveData.playerStats.charUsage[p1.charId]; if (cu) cu.wins = (cu.wins || 0) + 1; }
        if (Math.random() < 0.35) {
          const fragChars = ['flame_dancer', 'frost_whisper'].filter(c => !saveData.unlockedCharacters.includes(c));
          if (fragChars.length > 0) { const fc = fragChars[randInt(0, fragChars.length - 1)]; saveData.fragments[fc] = (saveData.fragments[fc] || 0) + 1; notificationText = '获得 ' + CHARACTERS[fc].name + ' 碎片! (' + saveData.fragments[fc] + '/20)'; notificationTimer = 90; }
        }
        if (saveData.shadowAIs.length < 10 && Math.random() < 0.5) {
          const bv = p1.extractBehaviorVector();
          saveData.shadowAIs.push({ id:'ai_' + Date.now(), name:'分身_' + (saveData.shadowAIs.length + 1), characterId:p1.charId, behaviorVector:bv, wins:0, losses:0 });
          notificationText = '新分身已创建!'; notificationTimer = 90;
        }
      } else { saveData.gold = Math.max(0, saveData.gold - 20); }
      saveData.playerStats.totalMatches++;
    }

    if (fightMode === 'auto') { const ai1 = saveData.shadowAIs[autoBattleSel1], ai2 = saveData.shadowAIs[autoBattleSel2]; if (ai1 && ai2) { if (winner === 'p1') { ai1.wins++; ai2.losses++; } else if (winner === 'p2') { ai2.wins++; ai1.losses++; } } }

    if (p1Wins >= WINS_NEEDED || p2Wins >= WINS_NEEDED) { stateSubState = 'MATCH_END'; stateTimer = 150; }
  }
}

function updateFight() {
  if (stateSubState === 'ROUND_INTRO') { stateTimer--; if (stateTimer <= 0) startRound(); return; }
  if (stateSubState === 'ROUND_END') {
    stateTimer--;
    if (stateTimer <= 0) { if (p1Wins >= WINS_NEEDED || p2Wins >= WINS_NEEDED) { stateSubState = 'MATCH_END'; stateTimer = 150; } else { roundNumber++; stateSubState = 'ROUND_INTRO'; stateTimer = 60; } }
    return;
  }
  if (stateSubState === 'MATCH_END') {
    stateTimer--;
    if (stateTimer <= 0) { const msg = checkUnlocks(); if (msg) { unlockMsg = msg; unlockMsgTimer = 120; } saveToDisk(); gameState = STATE.MENU; }
    return;
  }

  input.update();
  if (fightMode !== 'auto') { handlePlayerInput(p1, true); if (fightMode === 'pvp') handlePlayerInput(p2, false); }
  if (fightMode === 'pve' && ai) handleAIInput(p2, p1, ai);
  if (fightMode === 'auto') { if (autoBattleAI1) handleAIInput(p1, p2, autoBattleAI1); if (autoBattleAI2) handleAIInput(p2, p1, autoBattleAI2); }
  if (p1) p1.update(); if (p2) p2.update();
  checkCollisions(); particles.update();
  if (hitSparkTimer > 0) hitSparkTimer--; if (screenShake > 0) screenShake--;
  roundTimer--; checkRoundEnd();
  if (notificationTimer > 0) notificationTimer--;
  input.endFrame();
}

function renderFight() {
  ctx.save();
  if (screenShake > 0) ctx.translate((Math.random() - 0.5) * screenShake * 2, (Math.random() - 0.5) * screenShake * 2);
  drawBackground(ctx);
  if (p1) drawFighter(ctx, p1); if (p2) drawFighter(ctx, p2);
  particles.draw(ctx); drawHUD(ctx);

  if (stateSubState === 'ROUND_INTRO') {
    ctx.fillStyle = '#fff'; ctx.font = 'bold 56px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Round ' + (roundNumber + 1), CANVAS_W / 2, CANVAS_H / 2 - 30);
    ctx.fillStyle = '#ffaa00'; ctx.fillText('FIGHT!', CANVAS_W / 2, CANVAS_H / 2 + 30);
  }
  if (stateSubState === 'ROUND_END') {
    ctx.fillStyle = '#ffaa00'; ctx.font = 'bold 56px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(roundMessages[roundMessages.length - 1] || '', CANVAS_W / 2, CANVAS_H / 2);
  }
  if (stateSubState === 'MATCH_END') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = '#ffaa00'; ctx.font = 'bold 60px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(p1Wins >= WINS_NEEDED ? 'P1 胜利!' : 'P2 胜利!', CANVAS_W / 2, CANVAS_H / 2 - 20);
    ctx.fillStyle = '#fff'; ctx.font = '28px sans-serif';
    ctx.fillText('最大连击: ' + maxCombo, CANVAS_W / 2, CANVAS_H / 2 + 35);
    if (fightMode === 'pve' && p1Wins >= WINS_NEEDED) { ctx.fillStyle = '#ffaa00'; ctx.font = '20px sans-serif'; ctx.fillText('+100 金币', CANVAS_W / 2, CANVAS_H / 2 + 75); }
  }
  if (notificationTimer > 0) { ctx.fillStyle = '#ffaa00'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(notificationText, CANVAS_W / 2, CANVAS_H / 2 + 110); }
  ctx.restore();
  input.drawJoystick(ctx); input.drawButtons(ctx);
}

function renderTraining() {
  ctx.save();
  if (screenShake > 0) ctx.translate((Math.random() - 0.5) * screenShake * 2, (Math.random() - 0.5) * screenShake * 2);
  drawBackground(ctx);
  if (p1) drawFighter(ctx, p1); if (p2) drawFighter(ctx, p2);
  particles.draw(ctx); drawHUD(ctx);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('训练模式 - 自由练习', CANVAS_W / 2, 140);
  ctx.fillText('重拳键返回菜单', CANVAS_W / 2, 168);
  ctx.restore();
  input.drawJoystick(ctx); input.drawButtons(ctx);
}

// ============================================================
// 菜单操作
// ============================================================
function handleMenuInput() {
  if (input.currentDir === 3) { menuSelection = (menuSelection - 1 + MENU_ITEMS.length) % MENU_ITEMS.length; input.currentDir = 0; }
  if (input.currentDir === 7) { menuSelection = (menuSelection + 1) % MENU_ITEMS.length; input.currentDir = 0; }
  if (input.lpJust || input.hpJust) {
    switch (menuSelection) { case 0: fightMode = 'pve'; gameState = STATE.CHAR_SELECT; break; case 1: fightMode = 'pvp'; gameState = STATE.CHAR_SELECT; break; case 2: fightMode = 'training'; gameState = STATE.CHAR_SELECT; break; case 3: gameState = STATE.SHADOW_DOJO; break; case 4: gameState = STATE.AUTO_BATTLE; break; }
  }
}

function handleCharSelectInput() {
  if (input.currentDir === 1) { charSelectP1 = (charSelectP1 + 1) % unlockedCharIds.length; input.currentDir = 0; }
  if (input.currentDir === 5) { charSelectP1 = (charSelectP1 - 1 + unlockedCharIds.length) % unlockedCharIds.length; input.currentDir = 0; }
  if (fightMode === 'pvp') {
    if (input.currentDir === 3) { charSelectP2 = (charSelectP2 - 1 + unlockedCharIds.length) % unlockedCharIds.length; input.currentDir = 0; }
    if (input.currentDir === 7) { charSelectP2 = (charSelectP2 + 1) % unlockedCharIds.length; input.currentDir = 0; }
  }
  if (input.lpJust) initFight(fightMode);
  if (input.hpJust) gameState = STATE.MENU;
}

function handleShadowDojoInput() { if (input.hpJust || input.lpJust) gameState = STATE.MENU; }

function handleAutoBattleInput() {
  if (saveData.shadowAIs.length >= 2) {
    if (input.currentDir === 7) { autoBattleSel1 = (autoBattleSel1 + 1) % saveData.shadowAIs.length; input.currentDir = 0; }
    if (input.currentDir === 3) { autoBattleSel1 = (autoBattleSel1 - 1 + saveData.shadowAIs.length) % saveData.shadowAIs.length; input.currentDir = 0; }
    if (input.currentDir === 1) { autoBattleSel2 = (autoBattleSel2 + 1) % saveData.shadowAIs.length; input.currentDir = 0; }
    if (input.currentDir === 5) { autoBattleSel2 = (autoBattleSel2 - 1 + saveData.shadowAIs.length) % saveData.shadowAIs.length; input.currentDir = 0; }
    if (autoBattleSel1 === autoBattleSel2) autoBattleSel2 = (autoBattleSel1 + 1) % saveData.shadowAIs.length;
    if (input.lpJust) { fightMode = 'auto'; initFight('auto'); }
  }
  if (input.hpJust) gameState = STATE.MENU;
}

// ============================================================
// 主循环
// ============================================================
let lastTime = 0, accumulator = 0;
function update() {
  input.update();
  switch (gameState) { case STATE.MENU: handleMenuInput(); break; case STATE.CHAR_SELECT: handleCharSelectInput(); break; case STATE.FIGHTING: updateFight(); break; case STATE.TRAINING: updateFight(); break; case STATE.SHADOW_DOJO: handleShadowDojoInput(); break; case STATE.AUTO_BATTLE: handleAutoBattleInput(); break; }
  if (unlockMsgTimer > 0) { unlockMsgTimer--; if (unlockMsgTimer <= 0) unlockMsg = ''; }
  input.endFrame();
}

function render() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  switch (gameState) { case STATE.MENU: drawMenu(ctx); break; case STATE.CHAR_SELECT: drawCharSelect(ctx); break; case STATE.FIGHTING: renderFight(); break; case STATE.TRAINING: renderTraining(); break; case STATE.SHADOW_DOJO: drawShadowDojo(ctx); break; case STATE.AUTO_BATTLE: drawAutoBattle(ctx); break; }
  if (unlockMsg && unlockMsgTimer > 0) { ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(CANVAS_W / 2 - 180, 220, 360, 60); ctx.fillStyle = '#ffaa00'; ctx.font = 'bold 24px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(unlockMsg, CANVAS_W / 2, 260); }
}

function gameLoop(timestamp) {
  if (lastTime === 0) lastTime = timestamp;
  accumulator += Math.min(timestamp - lastTime, 100); lastTime = timestamp;
  while (accumulator >= FIXED_STEP) { update(); accumulator -= FIXED_STEP; }
  render();
  requestAnimationFrame(gameLoop);
}

document.addEventListener('visibilitychange', () => { if (document.hidden) saveToDisk(); });
window.addEventListener('beforeunload', () => saveToDisk());
resizeCanvas();
requestAnimationFrame(gameLoop);
</script>
